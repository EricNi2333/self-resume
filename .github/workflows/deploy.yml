# ─────────────────────────────────────────────────────────────────────────────
# CI/CD: Build → Push to GHCR → SSH deploy on self-hosted server
#
# Required GitHub Secrets:
#   DEPLOY_HOST   — server IP or hostname
#   DEPLOY_USER   — SSH user (e.g. ubuntu / root)
#   DEPLOY_KEY    — private SSH key (PEM, no passphrase)
#   DEPLOY_PORT   — SSH port (default 22)  [optional]
# ─────────────────────────────────────────────────────────────────────────────
name: Build & Deploy

on:
  push:
    branches: [main]
  workflow_dispatch:          # allow manual trigger from GitHub UI

env:
  REGISTRY: ghcr.io
  IMAGE_NAME: ${{ github.repository }}   # e.g. youruser/resume-site

jobs:
  # ──────────────────────────────────────────
  # Job 1 · Build Docker image & push to GHCR
  # ──────────────────────────────────────────
  build:
    name: Build & Push Image
    runs-on: ubuntu-latest
    permissions:
      contents: read
      packages: write

    outputs:
      image_tag: ${{ steps.meta.outputs.tags }}

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Log in to GitHub Container Registry
        uses: docker/login-action@v3
        with:
          registry: ${{ env.REGISTRY }}
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Extract image metadata (tags & labels)
        id: meta
        uses: docker/metadata-action@v5
        with:
          images: ${{ env.REGISTRY }}/${{ env.IMAGE_NAME }}
          tags: |
            type=sha,prefix=sha-,format=short
            type=raw,value=latest,enable=${{ github.ref == 'refs/heads/main' }}

      - name: Build and push
        uses: docker/build-push-action@v5
        with:
          context: .
          push: true
          tags: ${{ steps.meta.outputs.tags }}
          labels: ${{ steps.meta.outputs.labels }}
          cache-from: type=gha
          cache-to: type=gha,mode=max

  # ──────────────────────────────────────────
  # Job 2 · SSH into server and redeploy
  # ──────────────────────────────────────────
  deploy:
    name: Deploy to Server
    needs: build
    runs-on: ubuntu-latest
    environment: production      # optional: add approval gate in GitHub

    steps:
      - name: Deploy via SSH
        uses: appleboy/ssh-action@v1.0.3
        with:
          host: ${{ secrets.DEPLOY_HOST }}
          username: ${{ secrets.DEPLOY_USER }}
          key: ${{ secrets.DEPLOY_KEY }}
          port: ${{ secrets.DEPLOY_PORT || '22' }}
          script: |
            set -e

            # Pull latest image
            echo ${{ secrets.GITHUB_TOKEN }} | \
              docker login ghcr.io -u ${{ github.actor }} --password-stdin

            IMAGE="${{ env.REGISTRY }}/${{ env.IMAGE_NAME }}:latest"
            docker pull "$IMAGE"

            # Graceful restart with compose (zero-downtime if using replicas)
            cd ~/resume-site
            IMAGE="$IMAGE" docker compose up -d --no-build --pull never

            # Clean up old images
            docker image prune -f
